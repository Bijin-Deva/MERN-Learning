        <button id="scroll" style="background-color:yellowgreen">Interact with  Me!!</button>
        <p id="para">Paragraph 1</p>
        <script>
            document.getElementById("scroll").addEventListener("click", function(){
                document.getElementById("para").textContent="Button Clicked";
            })
            document.getElementById("scroll").addEventListener("dblclick", function(){
                document.getElementById("para").textContent="Button Double Clicked";
            })
            document.getElementById("scroll").addEventListener("mouseover", function(){
                document.getElementById("para").textContent="mouse hovering";
            })
            document.getElementById("scroll").addEventListener("mouseout", function(){
                document.getElementById("para").textContent="Paragraph 1";
            })

        </script>

        <input type="text" id="username" placeholder="Enter something here...">
        <p id="out"></p>
        <script>
            document.getElementById("username").addEventListener("input", function(){
                document.getElementById("out").textContent = "User typing... "+this.value;
            })
        </script>

        <label> Change BG Colour</label>
        <select id="bgcolour">
            <option value="">--Select one--</option>
            <option value="lightgreen">lightgreen</option>
            <option value="lightgrey">Light Grey</option>
            <option value="lightblue">Light Blue</option>
            <option value="orange">Orange</option>
        </select>  
        <script>
            document.getElementById("bgcolour").addEventListener("change",function(){
                document.getElementById("theme").style.backgroundColor=this.value;
