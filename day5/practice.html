<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#eef3fa;
    padding:30px;
}

.container{
    width:95%;
    max-width:1450px;
    height:92vh;
    background:#fff;
    border-radius:25px;
    overflow:hidden;
    display:grid;
    grid-template-columns:1fr 1fr;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

/* LEFT SIDE */

.left{
    position:relative;
    background:
    linear-gradient(
        rgba(37,99,235,0.25),
        rgba(37,99,235,0.25)
    ),
    url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1200");
    background-size:cover;
    background-position:center;
}

.left-content{
    position:absolute;
    top:160px;
    left:60px;
    color:white;
}

.left-content h1{
    font-size:64px;
    margin-bottom:20px;
}

.left-content p{
    font-size:18px;
    line-height:1.8;
    max-width:400px;
}

/* RIGHT SIDE */

.right{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:50px;
}

.form-container{
    width:100%;
    max-width:550px;
}

.form-container h1{
    font-size:58px;
    color:#0f172a;
    margin-bottom:15px;
}

.subtitle{
    color:#64748b;
    font-size:18px;
    margin-bottom:40px;
}

label{
    display:block;
    margin-bottom:10px;
    font-size:16px;
    font-weight:600;
}

input[type="email"],
input[type="password"]{
    width:100%;
    padding:18px;
    border:1px solid #dbe1ea;
    border-radius:10px;
    margin-bottom:28px;
    font-size:18px;
    outline:none;
}

input:focus{
    border-color:#2563eb;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.remember{
    display:flex;
    align-items:center;
    gap:10px;
}

.remember input{
    width:18px;
    height:18px;
}

.options a{
    color:#2563eb;
    text-decoration:none;
}

.login-btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:10px;
    background:linear-gradient(to right,#2563eb,#3b82f6);
    color:white;
    font-size:20px;
    font-weight:600;
    cursor:pointer;
}

.login-btn:hover{
    opacity:0.9;
}

.divider{
    display:flex;
    align-items:center;
    margin:30px 0;
    gap:15px;
}

.divider span{
    flex:1;
    height:1px;
    background:#dbe1ea;
}

.divider p{
    color:#64748b;
}

.google-btn{
    width:100%;
    padding:16px;
    border:1px solid #dbe1ea;
    border-radius:10px;
    background:white;
    cursor:pointer;
    font-size:18px;
}

.google-btn:hover{
    background:#f8fafc;
}

.register{
    margin-top:35px;
    text-align:center;
    color:#64748b;
    font-size:18px;
}

.register a{
    color:#2563eb;
    text-decoration:none;
    font-weight:600;
}

@media(max-width:1000px){

    .container{
        grid-template-columns:1fr;
        height:auto;
    }

    .left{
        min-height:350px;
    }

    .left-content{
        top:100px;
        left:40px;
    }

    .left-content h1{
        font-size:45px;
    }

    .form-container h1{
        font-size:42px;
    }
}
</style>

</head>
<body>

<div class="container">

    <div class="left">
        <div class="left-content">
            <h1>Welcome Back</h1>
            <p>
                Glad to see you again! Please login to
                continue your journey.
            </p>
        </div>
    </div>

    <div class="right">
        <div class="form-container">

            <h1>Welcome Back</h1>
            <p class="subtitle">
                Login to your account to continue
            </p>

            <form id="loginForm">

                <label>Email</label>
                <input type="email" placeholder="Enter your email" required>

                <label>Password</label>
                <input type="password" placeholder="Enter your password" required>

                <div class="options">
                    <div class="remember">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>

                    <a href="#">Forgot Password?</a>
                </div>

                <button class="login-btn" type="submit">
                    Login
                </button>

                <div class="divider">
                    <span></span>
                    <p>or</p>
                    <span></span>
                </div>

                <button class="google-btn" type="button">
                    Login with Google
                </button>

                <div class="register">
                    Don't have an account?
                    <a href="#">Register here</a>
                </div>

            </form>

        </div>
    </div>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();
    alert("Login button clicked!");
});
</script>

</body>
</html>
