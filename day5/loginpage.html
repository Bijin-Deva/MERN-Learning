<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Login Page</title>
        <style>
            body{
                padding-top: 15px;
                padding-left: 5px;
                padding-right: 5px;
                background-color: lightgoldenrodyellow;
            }
            .container{
               
                display:grid;
                grid-template-columns:1fr 1fr;
                height:90vh;
                border-radius: 20px;
                box-shadow: 0 4px 10px rgba(159, 64, 179, 0.9);
            }   
            .left{
                background-image:url("image1.jpg");
                background-size:cover;
                background-position:center;
                border-radius: 10px;
            }
            .right{
                
                box-shadow: 0 4px 10px rgba(241, 186, 2,1);
                display: flex;
                flex-direction: column;
                align-items: center; 
                border-radius: 10px;
                background-color: peachpuff;
            }
            .lefttxt{
                text-align: center;
                font-family: Georgia, 'Times New Roman', Times, serif;
                font-size: 45px;
                font-weight: bolder;
                padding-top: 150px;
            }
            .formData{
                width: 400px;
                height:300px;
                padding: 25px;
                border-radius: 20px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                background-color: rgba(77, 128, 161, 0.281);
                margin-top:70px;
            }
                

            #leftsubtxt{
                font-size: 30px;
                padding-top: 155px;
                color:rgb(22, 7, 243);
            }
            #h2{
                padding-left: 15px;
                text-align: center;
                padding-top: 2px;
                font-size: 38px;
            }
            #h1{
                padding-left: 15px;
                text-align: center;
                padding-top: 20px;
                padding-bottom: -25px;
                font-size: 38px;
            }
            #rightdiv{
                padding-left: 30px;
                box-shadow: 0 3px 10px rgba(0, 0, 0, 0.918);
                padding-top:30px;
            }
            #email{
                box-shadow: inset;
                border-radius: 6px;
                width:200px;
                height:25px;
                padding-left: 20px;
            }
            #submitbtn{
                width:300px;
                height:30px;
                background-color: rgb(29, 74, 141);
                text-align: center;
                border-radius:4px;
                color: white;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="left">
                <p class="lefttxt" id="leftmaintxt">Welcome Back!</p>
                <p class="lefttxt" id="leftsubtxt">Have a great day ahead.....<br/>Login to continue....</p>
            </div>
            <div class="right">
                <h2 id="h1">Welcome Back!!</h2>
                <h2 id="h2">Hurray!! You are just a step away to inside....</h2>
                <div class="formData" id="rightdiv">
                    <form onsubmit="handleSubmit()">
                        <label id="name" style="font-size:25px; font-family:'Times New Roman', serif; font-weight: bold;">
                            Email:
                        </label><br/>                        <div id="emailinput">
                            <input type="email" id="email" placeholder="Enter EMail">
                        </div>
                        <br/><label id="password" style="font-size: 25px; font-family:'Times New Roman', serif; font-weight: bold;">Password:</label><br/>
                        <input type="password" id="email" placeholder="Enter password"><br/><br/>
                        <button type="submit" id="submitbtn">Login</button>
                    </form>


                    <p style="font-size: 16px;">Forgot Password! or Dont have an Account?<p style="color: blue;">Contact Admin</p></p>

                </div>
            </div>
        </div>
    </body>
</html>
